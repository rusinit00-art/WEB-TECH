<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="keywords" content="web, html, css, javascript, js, java, python">
  <meta name="description" content="World best web development tutorials">
  <meta name="author" content="IJSE">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>CSS Positioning</title>
  <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">
  <link rel="stylesheet" href="../assets/lib/normalize.css">

  <style>

    section {
      width: 800px;
      height: 300px;
      border: 5px solid blue;
      position: relative;
    }

    div {
      width: 100px;
      aspect-ratio: 1/1;
      position: absolute;
    }

    #div1 {
      background-color: deeppink;
      top: 20px;
      left: 20px;
    }

    #div2 {
      background-color: deepskyblue;
      top: 20px;
      right: 20px;
    }

    #div3 {
      background-color: purple;
      left: 20px;
      bottom: 20px;
    }

    #div4 {
      background-color: orangered;
      right: 20px;
      bottom: 20px;
    }

  </style>

</head>

<body>

  <section>

    <div id="div1"></div>
    <div id="div2"></div>
    <div id="div3"></div>
    <div id="div4"></div>

  </section>

</body>

</html>
