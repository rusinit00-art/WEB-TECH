    /* /////////////////// Child Combinator(>) ////////////////////// */
    /*
    section > p {
        color: red;
    }
    */

    /* /////////////////// Decendent Combinator(" ") ////////////////////// */
    section p {
      color: green;
    }

    /* /////////////////// Adjacent Combinator(+) ////////////////////// */
    h1 + h2 {
      color: mediumpurple;
    }

    /* /////////////////// General Siblings Combinator(~) ////////////////////// */
    h1 ~ h2 {
      color: deeppink;
    }

  </style>
