<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="keywords" content="web, html, css, javascript, js, java, python">
  <meta name="description" content="World best web development tutorials">
  <meta name="author" content="IJSE">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Grid layout</title>
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">

  <link rel="stylesheet" href="assets/lib/normalize.css">

  <style>

    section {
      width: 1000px;
      height: 500px;
      border: 5px solid black;

      display: grid;
      /*grid-template-columns: 1fr 1fr 1fr;*/
      grid-template-columns: repeat(3,1fr);  /* ekm dee godk paarak ona nm */

    }

    section > div {
      border: 1px solid darkred;
    }

    section > div:first-child {
      border: 1px solid darkorchid;
      grid-column: 1/3;
    }

    section > div:nth-child(2) {
      background-color:  blue;
    }

    section > div:nth-child(3) {
      background-color:  green;
      grid-row: 2/4;
    }
    section > div:nth-child(4) {
      background-color:  deeppink;
      grid-column: 2/4;
    }
    section > div:nth-child(5) {
      background-color:  brown;
    }
    section > div:nth-child(6) {
      background-color:  rebeccapurple;
    }
    section > div:nth-child(7) {
      background-color: darkslategray;

    } section > div:nth-child(8) {
        background-color:  darkred;
      ;
      }
    section > div:nth-child(9) {
      background-color:  gray;
    }



  </style>

</head>

<body>

<section>
  <div></div>
  <div></div>
  <div></div>

  <div></div>
  <div></div>
  <div></div>

  <div></div>
  <div></div>
  <div></div>


</section>

</body>

</html>
