<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">
    <meta name="description" content="World best web development tutorials">
    <meta name="author" content="IJSE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ASSIGNMENT</title>
    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">
    <link rel="stylesheet" href="../assets/lib/normalize.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            border: 2px solid black;
            box-sizing: border-box;
            position: relative;
        }

        main {
            width: 100%;
            height: 100%;
            position: relative;
        }


        #div1, #div2, #div3, #div4 {
            width: 50%;
            height: 50%;
            position: absolute;
        }

        #div1 {
            background-color: red;
            top: 0;
            left: 0;
        }

        #div2 {
            background-color: green;
            top: 0;
            right: 0;
        }

        #div3 {
            background-color: orange;
            bottom: 0;
            left: 0;
        }

        #div4 {
            background-color: deeppink;
            bottom: 0;
            right: 0;
        }


        .circle-container {
            width: 16vw;
            aspect-ratio: 1/1;
            background-color: white;
            border-radius: 50%;
            position: absolute;
            inset: 0;
            margin: auto;
        }


        h1 {
            width: 6vw;
            aspect-ratio: 1/1;
            background-color: red;
            position: absolute;
            inset: 0;
            margin: auto;
        }


        #center-box {
            width: 15vw;
            aspect-ratio: 1/1;
            background-color: white;
            position: absolute;
            inset: 0;
            margin: auto;
            z-index: 10;
        }


        #circle {
            background-color: red;
            width: 50%;
            aspect-ratio: 1/1;
            border-radius: 50%;
            position: absolute;
            inset: 0;
            margin: auto;
        }


        .side-circle {
            background-color: white;
            position: absolute;
            width: 14vw;
            aspect-ratio: 1/1;
            border-radius: 50%;
            z-index: 5;
        }

        #border1 { top: -7vw; left: -7vw; }
        #border2 { top: -7vw; right: -7vw; }
        #border3 { bottom: -7vw; left: -7vw; }
        #border4 { bottom: -7vw; right: -7vw; }


        #top-mid { top: -7vw; left: 50%; transform: translateX(-50%); }
        #bottom-mid { bottom: -7vw; left: 50%; transform: translateX(-50%); }

    </style>
</head>
<body>

<main>

    <div id="div1">
        <div class="circle-container"><h1></h1></div>
    </div>
    <div id="div2">
        <div class="circle-container"><h1></h1></div>
    </div>
    <div id="div3">
        <div class="circle-container"><h1></h1></div>
    </div>
    <div id="div4">
        <div class="circle-container"><h1></h1></div>
    </div>


    <div class="side-circle" id="border1"></div>
    <div class="side-circle" id="border2"></div>
    <div class="side-circle" id="border3"></div>
    <div class="side-circle" id="border4"></div>


    <div class="side-circle" id="top-mid"></div>
    <div class="side-circle" id="bottom-mid"></div>

</main>


<div id="center-box">
    <div id="circle"></div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">
    <meta name="description" content="World best web development tutorials">
    <meta name="author" content="IJSE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Grid layout</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">

    <link rel="stylesheet" href="assets/lib/normalize.css">

    <style>

        section {
            width: 800px;
            height: 500px;
            border: 5px solid black;

            display: grid;
            /*grid-template-columns: 1fr 1fr 1fr;*/
            grid-template-columns: repeat(4,1fr); /* ekm dee godk paarak ona nm */
        }

        section > div {
            border: 1px solid darkred;
        }

        section > div:first-child {
            background-color:  red;
            grid-column: 1/3;


        }

        section > div:nth-child(2) {
            background-color:  darkgreen;
        }

        section > div:nth-child(3) {
            background-color: green;
            grid-column: 4/5;
            grid-row:1/4

        }
        section > div:nth-child(4) {
            background-color: orange;

        }
        section > div:nth-child(5) {
            background-color:  purple;
        }
        section > div:nth-child(6) {
            background-color:  deeppink;
        }
        section > div:nth-child(7) {
            background-color: blue;

        } section > div:nth-child(8) {
              background-color:  brown;
              grid-column: 2/4;


          }






    </style>

</head>

<body>

<section>
    <div></div>
    <div></div>
    <div></div>

    <div></div>
    <div></div>
    <div></div>

    <div></div>
    <div></div>







</section>

</body>

</html>
