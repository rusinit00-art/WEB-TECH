<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="keywords" content="web, html, css, javascript, js, java, python">
  <meta name="description" content="World best web development tutorials">
  <meta name="author" content="IJSE">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>CSS Positioning</title>
  <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">

  <link rel="stylesheet" href="../assets/lib/normalize.css">

  <style>

    section {
      width: 50vw;
      height: 50vh;
      position: relative;
    }

    #section1 {
      background-color: yellowgreen;
    }

    #section2 {
      background-color: red;
      left: 50vw;
      bottom: 50vh;
    }

    #section3 {
      background-color: deepskyblue;
      bottom: 50vh;
    }

    #section4 {
      background-color: hotpink;
      left: 50vw;
      bottom: 100vh;
    }

  </style>

</head>

<body>

  <section id="section1"></section>
  <section id="section2"></section>
  <section id="section3"></section>
  <section id="section4"></section>

</body>

</html>
