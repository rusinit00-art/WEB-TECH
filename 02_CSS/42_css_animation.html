  <style>

    section {
      width: 1000px;
      height: 600px;
      border: 5px solid green;
    }

    div {
      width: 100px;
      aspect-ratio: 1/1;
      background: red;

      animation-name: move;
      animation-duration: 3000ms;
      animation-iteration-count: infinite;
      animation-direction: alternate;
    }

    @keyframes move {
      0% {
        margin-left: 0;
        margin-top: 0;
      }
      25% {
        margin-left: 900px;
        margin-top: 0;
      }
      50% {
        margin-left: 900px;
        margin-top: 500px;
      }
      75% {
        margin-left: 0;
        margin-top: 500px;
      }
    }

  </style>

</head>
<body>

<section>

  <div></div>

</section>
