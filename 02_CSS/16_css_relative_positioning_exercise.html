<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="keywords" content="web, html, css, javascript, js, java, python">
  <meta name="description" content="World best web development tutorials">
  <meta name="author" content="IJSE">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>CSS Positioning</title>
  <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">

  <link rel="stylesheet" href="../assets/lib/normalize.css">

  <style>

    div {
      width: 100px;
      height: 100px;
      position: relative;
    }

    #div1 {
      background-color: darkred;
      left: 100px;
    }

    #div2 {
      background-color: red;
      left: 200px;
    }

    #div3 {
      background-color: deeppink;
      left: 300px;
    }

    #div4 {
      background-color: hotpink;
      left: 400px;
    }

    #div5 {
      background-color: pink;
      left: 500px;
    }
  </style>

</head>

<body>

<div id="div1"></div>
<div id="div2"></div>
<div id="div3"></div>
<div id="div4"></div>
<div id="div5"></div>

</body>

</html>
