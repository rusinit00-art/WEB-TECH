  <title>CSS Selector</title>
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">

  <style>

    /* /////////////////////////// Grouping Selectors /////////////////////////// */

    /*
    h1 {
        color: red;
    }

    #myh2 {
        color: red;
    }

    .myClass {
        color: red;
    }

    [href] {
        color: red;
    }
     */

    h1, #myh2, .myClass, [href] {
      color: deepskyblue;
    }


  </style>

</head>

<body>

<h1>Hello World!</h1> <!-- Type selector -->
<h2 id="myh2">Hiiiiiii</h2> <!-- Id selector -->
<h3 class="myClass">Wowwwww</h3> <!-- Class selector -->
<h4 class="myClass">Hellowwwww</h4> <!-- Class selector -->
<a href="https://ijse.lk">IJSE</a> <!-- Attribute selector -->

</body>

</html>
