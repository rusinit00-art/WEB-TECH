<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <meta name="keywords" content="web, html, css, javascript, js, java, python">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Grid layout</title>
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">

  <link rel="stylesheet" href="assets/lib/normalize.css">
  <style>

    section {
      width: 300px;
      height: 300px;
      border: 2px solid blue;

      /*overflow: hidden;*/
      overflow: scroll;
    }

    section>div:first-child {
      width: 3000px;
      height: 80px;
      background: orange;
    }

    section>div:nth-child(2) {
      width: 80px;
      height: 3600px;
      background: deeppink;
    }
  </style>

</head>

<body>

<section>
  <div></div>
  <div></div>
</section>

</body>
