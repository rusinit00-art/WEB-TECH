<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="keywords" content="web, html, css, javascript, js, java, python">
  <meta name="description" content="World best web development tutorials">
  <meta name="author" content="IJSE">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>CSS Positioning</title>
  <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">
  <link rel="stylesheet" href="../assets/lib/normalize.css">

  <style>


    div {
      width: 50vw;
      height: 50vh;
      position: absolute;
    }

    #div1 {
      background-color: red;
    }

    #div2 {
      background-color: greenyellow;
      right: 0;
    }

    #div3 {
      background-color: blue;
      bottom: 0;
    }

    #div4 {
      background-color: orange;
      right: 0;
      bottom: 0;
    }


  </style>

</head>

<body>

  <div id="div1"></div>
  <div id="div2"></div>
  <div id="div3"></div>
  <div id="div4"></div>

</body>

</html>
