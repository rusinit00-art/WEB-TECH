<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jquery Events</title>

  <style>
    div {
      width: 200px;
      aspect-ratio: 1/1;
      background: lightskyblue;
      border: 3px solid blue;
    }
  </style>

</head>
<body>

<button id="btn">Click</button>

<div id="box1"></div>

<input id="input1" type="text">

<script src="../assets/lib/jquery-4.0.0.min.js"></script>
<script>

  // document.getElementById("btn").addEventListener("click", () => {})
  // document.getElementById("btn").addEventListener("click", function () {})

  // ----------------------- Single Click -------------------------
  $('#btn').on("click", function () {
    console.log("single clicked!!");
  })

  // ----------------------- Double Click -------------------------
  $('#btn').on("dblclick", function () {
    console.log("double clicked!!");
  })

  // ----------------------- Mouse Enter -------------------------
  $('#box1').on("mouseenter", function () {
    console.log("mouse entered!!");
  })

  // ----------------------- Mouse Leave -------------------------
  $('#box1').on("mouseleave", function () {
    console.log("mouse leaved!!");
  })

  // ----------------------- Mouse Over -------------------------
  $('#box1').on("mouseover", function () {
    console.log("mouse over!!");
  })

  // ----------------------- Mouse Down -------------------------
  $('#box1').on("mousedown", function () {
    console.log("mouse down!!");
  })

  // ----------------------- Mouse Up -------------------------
  $('#box1').on("mouseup", function () {
    console.log("mouse up!!");
  })

  // ----------------------- focus -------------------------
  $('#input1').on("focus", function () {
    console.log("focused!!");
  })

  // ----------------------- blur -------------------------
  $('#input1').on("blur", function () {
    console.log("blur!!");
  })

  // ----------------------- keydown -------------------------
  $('#input1').on("keydown", function () {
    console.log("keydown!!");
  })

  // ----------------------- keydown -------------------------
  $('#input1').on("keyup", function () {
    console.log("keyup!!");
  })

  // ----------------------- keypress -------------------------
  $('#input1').on("keypress", function () {
    console.log("keypress!!");
  })

  // ----------------------- event object -------------------------
  $('#input1').on("keypress", function (e) {
    console.log(e);
    console.log(e.key);
  })

</script>

</body>
</html>
