<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Javascript</title>


</head>

<body>


<script>
  var a = 10;

  if(a > 100) {
    console.log("Yes!");
  } else {
    console.log("No!");
  }

  var marks = 46;

  if(marks >= 75) {
    console.log("A");
  } else if(marks >= 65) {
    console.log("B");
  } else if(marks >= 55) {
    console.log("C");
  } else if(marks >= 35) {
    console.log("S");
  } else {
    console.log("F");
  }


  var num = 10;
  if(num%2==0) {
    console.log("Even");
  } else {
    console.log("Odd");
  }


</script>

</body>

</html>
